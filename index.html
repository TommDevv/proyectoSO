<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Visualizador Planificador SFJ</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script data-purpose="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            retro: {
              bg: '#2e2e2e',
              surface: '#c0c0c0',
              border: '#d3d3d3',
              shadow: '#404040',
              highlight: '#ffffff'
            }
          },
          fontFamily: {
            system: ['Courier New', 'Courier', 'monospace']
          }
        }
      }
    }
  </script>
<style data-purpose="retro-ui-styling">
    body {
      background-color: #2e2e2e;
      font-family: 'Courier New', Courier, monospace;
      color: #000;
    }

    .retro-panel {
      background-color: #c0c0c0;
      border: 3px solid;
      border-top-color: #ffffff;
      border-left-color: #ffffff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      box-shadow: inset 1px 1px 0px #d3d3d3;
    }

    .retro-inset {
      background-color: #ffffff;
      border: 2px solid;
      border-top-color: #404040;
      border-left-color: #404040;
      border-right-color: #ffffff;
      border-bottom-color: #ffffff;
    }

    .retro-button {
      background-color: #c0c0c0;
      border: 2px solid;
      border-top-color: #ffffff;
      border-left-color: #ffffff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      padding: 4px 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .retro-button:active {
      border-top-color: #404040;
      border-left-color: #404040;
      border-right-color: #ffffff;
      border-bottom-color: #ffffff;
      padding: 5px 11px 3px 13px;
    }

    .process-red { background-color: #ff0000; color: white; }
    .process-blue { background-color: #0000ff; color: white; }
    .process-green { background-color: #00ff00; color: black; }
    .process-yellow { background-color: #ffff00; color: black; }
    .process-cyan { background-color: #00ffff; color: black; }
    .process-magenta { background-color: #ff00ff; color: white; }

    .gantt-scroll::-webkit-scrollbar {
      height: 12px;
    }
    .gantt-scroll::-webkit-scrollbar-track {
      background: #808080;
    }
    .gantt-scroll::-webkit-scrollbar-thumb {
      background: #c0c0c0;
      border: 2px solid #ffffff;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<main class="retro-panel w-full max-w-4xl flex flex-col overflow-hidden" data-purpose="app-shell">
<header class="bg-[#000080] text-white px-2 py-1 flex justify-between items-center select-none" data-purpose="header-bar">
<div class="flex items-center gap-2">
<div class="w-4 h-4 bg-gray-300 border border-white"></div>
<h1 class="font-bold text-sm uppercase tracking-wider">Planificador SFJ v1.0</h1>
</div>
<div class="flex gap-1">
<button class="w-5 h-5 retro-panel flex items-center justify-center text-black text-xs font-bold">_</button>
<button class="w-5 h-5 retro-panel flex items-center justify-center text-black text-xs font-bold">X</button>
</div>
</header>
<div class="p-6 flex flex-col gap-8">
<section data-purpose="gantt-chart-section">
<h2 class="text-lg font-bold mb-2">Diagrama de Gantt</h2>
<div class="retro-inset p-2 bg-gray-800 h-32 overflow-x-auto gantt-scroll flex items-end relative" id="gantt-container">
<div class="absolute inset-0 flex items-center justify-center text-gray-400 italic" id="empty-message">
            Para visualizar la ejecución, añada algún proceso
          </div>
</div>
<div class="mt-1 flex justify-between text-xs font-bold px-1" id="time-markers">
<span>0ms</span>
<span id="end-time"></span>
</div>
</section>
<section class="grid grid-cols-1 md:grid-cols-2 gap-6" data-purpose="control-panel">
<div class="retro-panel p-4" data-purpose="process-input-form">
<h3 class="font-bold border-b-2 border-retro-shadow mb-4">Agregar procesos</h3>
<div class="flex flex-col gap-4">
<div class="flex items-center justify-between gap-4">
<label class="whitespace-nowrap" for="burst-time">Duración (ms):</label>
<input class="retro-inset w-full px-2 py-1 focus:ring-0 focus:outline-none text-black" id="burst-time" max="100" min="1" type="number" value="10"/>
</div>
<button class="retro-button w-full" id="add-process-btn">Añadir Proceso</button>
</div>
</div>
<div class="retro-panel p-4" data-purpose="process-list">
<h3 class="font-bold border-b-2 border-retro-shadow mb-4">Cola de procesos</h3>
<div class="retro-inset bg-white h-40 overflow-y-auto">
<table class="w-full text-left text-sm" id="process-table">
<thead class="bg-gray-200 sticky top-0 border-b border-gray-400">
<tr>
<th class="px-2 py-1">ID</th>
<th class="px-2 py-1 text-right">Burst</th>
<th class="px-2 py-1 text-center">Color</th>
</tr>
</thead>
<tbody id="process-list-body">
</tbody>
</table>
</div>
<div class="mt-4 flex gap-2">
<button class="retro-button text-xs flex-1" id="reset-btn">Reestablecer</button>
</div>
</div>
</section>
</div>
<footer class="bg-retro-surface border-t-2 border-retro-shadow px-2 py-1 text-[10px]" data-purpose="status-bar">
<div class="flex justify-between">
<div class="flex gap-4">
<span>Listo para ejecutar...</span>
<span class="font-bold" id="avg-wait-time-display">TIEMPO PROMEDIO: 0.00ms</span>
</div>
<span>SJFS-OS System Ready</span>
</div>
<div class="mt-1 text-center">Creado por: Ana Morcote y Tomás Delgado</div>
</footer>
</main>
<script data-purpose="sjf-logic">
  document.addEventListener('DOMContentLoaded', () => {
    const burstInput = document.getElementById('burst-time');
    const addBtn = document.getElementById('add-process-btn');
    const resetBtn = document.getElementById('reset-btn');
    const tableBody = document.getElementById('process-list-body');
    const ganttContainer = document.getElementById('gantt-container');
    const emptyMsg = document.getElementById('empty-message');
    const endTimeLabel = document.getElementById('end-time');
    const avgWaitDisplay = document.getElementById('avg-wait-time-display');

    let processes = [];
    let processCounter = 1;
    const colors = ['process-red', 'process-blue', 'process-green', 'process-yellow', 'process-cyan', 'process-magenta'];

    function render() {
      tableBody.innerHTML = '';
      ganttContainer.innerHTML = '';

      if (processes.length === 0) {
        emptyMsg.classList.remove('hidden');
        ganttContainer.appendChild(emptyMsg);
        endTimeLabel.textContent = '';
        avgWaitDisplay.textContent = 'AVG WAIT: 0.00ms';
        return;
      }

      emptyMsg.classList.add('hidden');

      const sortedProcesses = [...processes].sort((a, b) => a.burst - b.burst);

      let totalTime = 0;
      let totalWaitTime = 0;
      let currentWaitTime = 0;

      sortedProcesses.forEach((proc, index) => {
        if (index > 0) {
          currentWaitTime += sortedProcesses[index - 1].burst;
        }
        totalWaitTime += currentWaitTime;

        const startTime = totalTime;
        const endTime = totalTime + proc.burst;

        const tr = document.createElement('tr');
        tr.className = "border-b border-gray-100";
        tr.innerHTML = `
          <td class="px-2 py-1">P${proc.id}</td>
          <td class="px-2 py-1 text-right font-mono">${proc.burst}ms</td>
          <td class="px-2 py-1 text-center"><div class="inline-block w-3 h-3 border border-black ${proc.color}"></div></td>
        `;
        tableBody.appendChild(tr);

        const block = document.createElement('div');
        block.style.width = `${proc.burst * 10}px`;
        block.className = `relative flex-shrink-0 h-24 border-r-2 border-black flex flex-col items-center justify-center text-xs font-bold transition-all duration-300 ${proc.color}`;
        block.innerHTML = `
          <span>P${proc.id}</span>
          <span class="text-[10px] opacity-75">${proc.burst}</span>
          <span class="absolute bottom-1 left-1 text-[10px] text-current">${startTime}</span>
          <span class="absolute bottom-1 right-1 text-[10px] text-current">${endTime}</span>
        `;
        ganttContainer.appendChild(block);

        totalTime = endTime;
      });

      const avgWait = (totalWaitTime / processes.length).toFixed(2);
      avgWaitDisplay.textContent = `AVG WAIT: ${avgWait}ms`;
      endTimeLabel.textContent = `${totalTime}ms`;
    }

    addBtn.addEventListener('click', () => {
      const burstValue = parseInt(burstInput.value);
      if (isNaN(burstValue) || burstValue <= 0) return;

      processes.push({
        id: processCounter++,
        burst: burstValue,
        color: colors[(processCounter - 1) % colors.length]
      });

      render();
      burstInput.value = '10';
      burstInput.focus();
    });

    resetBtn.addEventListener('click', () => {
      processes = [];
      processCounter = 1;
      render();
    });

    burstInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addBtn.click();
    });
  });
  </script>
</body></html>
